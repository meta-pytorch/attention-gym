name: modal-tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    if: github.actor == 'drisspg' && github.triggering_actor == 'drisspg'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Modal
        run: python -m pip install modal

      - name: Run pytest on a B200
        run: modal run -m modal_tests
